{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>User List</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="page-header">
        <h2>All Users</h2>
        <a class="button secondary" href="{% url 'event_list' %}">← Back</a>
    </div>

    <!-- USERS -->
    <div class="card">

        {% if users %}

            <table class="table">

                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                    </tr>
                </thead>

                <tbody>
                    {% for user in users %}
                        <tr>
                            <td>{{ user.first_name }} {{ user.last_name }}</td>
                            <td>{{ user.email }}</td>
                            <td>
                                <span class="badge role">
                                    {{ user.role }}
                                </span>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>

            </table>

        {% else %}
            <div class="empty-state">
                <p>No users found.</p>
            </div>
        {% endif %}

    </div>

</div>

</body>
</html>
