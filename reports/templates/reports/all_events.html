{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<!DOCTYPE html>
<html>
<head><title>All Events</title></head>
<body>

    <h2>All Events (Past, Present and Future)</h2>

    {% for event in events %}
        <div style="border:1px solid black; padding:10px; margin:10px;">
            <h3>{{ event.name }}</h3>
            <p>{{ event.description }}</p>
            <p>Start: {{ event.start_date }}</p>
            <p>End: {{ event.end_date }}</p>
        </div>
    {% empty %}
        <p>No events found.</p>
    {% endfor %}

    <br>
    <a href="{% url 'event_list' %}">Back to Events</a>

</body>
</html>
