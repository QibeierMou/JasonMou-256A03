{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<!DOCTYPE html>
<html>
<head><title>Delete Position</title></head>
<body>
    <h2>Delete Position</h2>
    <p>Are you sure you want to delete <strong>{{ position.name }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
    </form>
    <br>
    <a href="{% url 'position_list' %}">No, go back</a>
</body>
</html>
