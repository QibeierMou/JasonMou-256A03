{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="page-header">
        <h2>{{ title }}</h2>
        <a class="button secondary" href="{% url 'position_list' %}">← Back</a>
    </div>

    <!-- FORM CARD -->
    <div class="card form-card">

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                {{ form.as_p }}
            </div>

            <div class="form-actions">
                <button class="button" type="submit">💾 Save</button>
                <a class="button secondary" href="{% url 'position_list' %}">
                    Cancel
                </a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
