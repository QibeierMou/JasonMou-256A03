{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register for Event</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="page-header">
        <h2>Register for Event</h2>
        <a class="button secondary" href="{% url 'event_list' %}">← Back</a>
    </div>

    <!-- EVENT DETAILS -->
    <div class="card">
        <h3>{{ event.name }}</h3>
        <p>{{ event.description }}</p>

        <p><strong>Start:</strong> {{ event.start_date }}</p>
        <p><strong>End:</strong> {{ event.end_date }}</p>
    </div>

    <!-- REGISTRATION FORM -->
    <div class="card form-card">

        <h3>Select Your Position</h3>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Choose a position</label>
                <select name="position" class="input">
                    {% for position in positions %}
                        <option value="{{ position.id }}">
                            {{ position.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-actions">
                <button class="button" type="submit">✅ Sign Up</button>
                <a class="button secondary" href="{% url 'event_list' %}">Cancel</a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
