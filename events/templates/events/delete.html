{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<!DOCTYPE html>
<html>
<head><title>Delete Event</title></head>
<body>

    <h2>Delete Event</h2>
    <p>Are you sure you want to delete <strong>{{ event.name }}</strong>?</p>
    <p>This will also delete all registrations for this event.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
    </form>

    <br>
    <a href="{% url 'event_list' %}">No, go back</a>

</body>
</html>
